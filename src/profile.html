<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CE-IPRC | Profile</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  </head>
  <body>
    <div id="navbar-container"></div>
    <main>
      <h1>My Profile</h1>
      <p class="subtitle">Your personal information on record with CE-IPRC.</p>
      <div class="profile-card">
        <div class="avatar" id="avatar">?</div>
        <div class="profile-info">
          <h2 id="p-name">—</h2>
          <p class="profile-info__id" id="p-id">—</p>
        </div>
      </div>
      <div class="profile-details">
        <h2>Personal Information</h2>
        <div class="detail-row"><span class="detail-label">Full Name</span><span id="d-name">—</span></div>
        <div class="detail-row"><span class="detail-label">Email Address</span><span id="d-email">—</span></div>
        <div class="detail-row"><span class="detail-label">Phone Number</span><span id="d-phone">—</span></div>
        <div class="detail-row"><span class="detail-label">Member ID</span><span id="d-id">—</span></div>
        <div class="detail-row"><span class="detail-label">National ID</span><span id="d-national">—</span></div>
        <div class="detail-row"><span class="detail-label">Address</span><span id="d-address">—</span></div>
        <div class="detail-row"><span class="detail-label">Member Since</span><span id="d-member">—</span></div>
      </div>
    </main>
    <footer><p>© 2025 CE-IPRC · Caisse d'Entraide IPRC</p></footer>
    <script type="module" src="./js/profile.js"></script>
  </body>
</html>
