<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CE-IPRC | Savings History</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script type="module">
      import { requireAuth, logout } from "./js/auth.js";
      import { getSavings, addSavingsRecord } from "./js/data.js";
      import { formatCurrency, formatDate, showAlert } from "./js/utils.js";

      window.addEventListener("DOMContentLoaded", () => {
        const member = requireAuth();
        document.getElementById("member-name").textContent = member.name;
        document.getElementById("logout-btn").addEventListener("click", logout);

        function renderTable(filter = "") {
          let records = getSavings(member.id);
          if (filter) records = records.filter((r) => r.date.startsWith(filter));
          records = records.reverse();

          const tbody = document.getElementById("savings-tbody");
          if (records.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="empty">No transactions found.</td></tr>`;
            return;
          }
          tbody.innerHTML = records
            .map(
              (r) => `
            <tr>
              <td>${formatDate(r.date)}</td>
              <td><span class="badge badge--${r.type === "deposit" ? "green" : "red"}">${r.type}</span></td>
              <td>${formatCurrency(r.amount)}</td>
              <td>${formatCurrency(r.balance)}</td>
            </tr>`
            )
            .join("");
        }

        // Initial render
        renderTable();

        // Filter by month/year
        document.getElementById("filter-date").addEventListener("change", (e) => {
          renderTable(e.target.value);
        });
        document.getElementById("btn-clear-filter").addEventListener("click", () => {
          document.getElementById("filter-date").value = "";
          renderTable();
        });

        // Add transaction form
        document.getElementById("savings-form").addEventListener("submit", (e) => {
          e.preventDefault();
          const type = document.getElementById("tx-type").value;
          const amount = parseFloat(document.getElementById("tx-amount").value);
          const date = document.getElementById("tx-date").value;

          if (!amount || amount <= 0) {
            showAlert("Please enter a valid amount.");
            return;
          }

          const records = getSavings(member.id);
          const lastBalance = records.length ? records[records.length - 1].balance : 0;
          const newBalance =
            type === "deposit" ? lastBalance + amount : lastBalance - amount;

          if (newBalance < 0) {
            showAlert("Insufficient balance for this withdrawal.");
            return;
          }

          addSavingsRecord({ memberId: member.id, date, type, amount, balance: newBalance });
          showAlert("Transaction recorded successfully!", "success");
          e.target.reset();
          renderTable();
        });
      });
    </script>
  </head>
  <body>
    <header class="site-header">
      <a href="/dashboard.html" class="logo">CE-IPRC</a>
      <nav>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/savings.html">Savings</a>
        <a href="/loans.html">Loans</a>
        <a href="/interest.html">Interest</a>
        <a href="/profile.html">Profile</a>
        <button class="btn-logout" id="logout-btn">Logout</button>
      </nav>
    </header>

    <main>
      <h1>Savings History</h1>
      <p class="subtitle">All deposit and withdrawal transactions for <span id="member-name"></span>.</p>

      <!-- Add Transaction Form -->
      <details style="background:var(--white);border-radius:var(--radius);padding:1rem 1.4rem;margin-bottom:1.5rem;box-shadow:var(--shadow)">
        <summary style="cursor:pointer;font-weight:600;color:var(--green-primary)">+ Add New Transaction</summary>
        <form id="savings-form" style="margin-top:1rem;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:0.75rem;align-items:end">
          <div class="form-group" style="margin:0">
            <label for="tx-type">Type</label>
            <select id="tx-type">
              <option value="deposit">Deposit</option>
              <option value="withdrawal">Withdrawal</option>
            </select>
          </div>
          <div class="form-group" style="margin:0">
            <label for="tx-amount">Amount (RWF)</label>
            <input type="number" id="tx-amount" placeholder="e.g. 50000" min="1" required />
          </div>
          <div class="form-group" style="margin:0">
            <label for="tx-date">Date</label>
            <input type="date" id="tx-date" required />
          </div>
          <button type="submit" class="btn btn--primary" style="width:auto;padding:0.6rem 1.2rem">Save</button>
        </form>
      </details>

      <!-- Filter -->
      <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1rem">
        <label for="filter-date" style="font-size:0.9rem;font-weight:600">Filter by Month:</label>
        <input type="month" id="filter-date" style="padding:0.4rem 0.7rem;border:1px solid var(--gray-border);border-radius:var(--radius)" />
        <button id="btn-clear-filter" class="btn btn--outline" style="padding:0.4rem 0.9rem;font-size:0.85rem">Clear</button>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Running Balance</th>
            </tr>
          </thead>
          <tbody id="savings-tbody">
            <tr><td colspan="4" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>

    <footer><p>© 2025 CE-IPRC · Caisse d'Entraide IPRC</p></footer>
  </body>
</html>
