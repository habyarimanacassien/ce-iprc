<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CE-IPRC | Login</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script type="module" src="./js/auth.js"></script>
    <script type="module">
      import { initLoginPage } from "./js/auth.js";
      window.addEventListener("DOMContentLoaded", initLoginPage);
    </script>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <!-- Brand -->
        <div class="brand">
          <h1>CE-IPRC</h1>
          <p>Caisse d'Entraide IPRC — Member Portal</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="your@email.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>

          <!-- Error message -->
          <span
            id="login-error"
            class="error-msg"
            style="display: none; margin-bottom: 0.75rem"
          ></span>

          <button type="submit" class="btn btn--primary">Sign In</button>
        </form>

        <!-- Demo hint -->
        <p
          style="
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: #6b7280;
          "
        >
          Demo: <strong>cassien@example.com</strong> / <strong>demo1234</strong>
        </p>
      </div>
    </div>
  </body>
</html>
